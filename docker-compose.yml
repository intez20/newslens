# ===================================================================
# NewsLens — Docker Compose
# (KRaft Kafka + Kafka UI + Producer + Flink + Ollama + Enrichment
#  + Quality Gate + Weaviate + Weaviate Ingestion
#  + Airflow + Marquez)
# ===================================================================
# Usage:
#   docker compose up -d             # start all services
#   docker compose logs -f producer  # watch producer logs
#   docker compose down              # stop everything
# ===================================================================

services:
  # ---------- Kafka Broker (KRaft mode — no Zookeeper) ----------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: newslens-kafka
    hostname: kafka
    ports:
      - "29092:29092"      # host access for local dev/testing
    environment:
      # KRaft mode — single combined broker + controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # Listeners: internal (9092), controller (9093), host (29092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Single-broker replication
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Topics are created explicitly via kafka-init — no auto-create
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Default log retention (overridden per-topic in kafka-init)
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - newslens-net

  # ---------- Topic Initialisation (runs once, then exits) ----------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: newslens-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo '=== Creating Kafka topics ==='
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic raw-news --partitions 3 --replication-factor 1 --config retention.ms=86400000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic tech-news --partitions 1 --replication-factor 1 --config retention.ms=172800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic finance-news --partitions 1 --replication-factor 1 --config retention.ms=172800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic world-news --partitions 1 --replication-factor 1 --config retention.ms=172800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic news-failed --partitions 1 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic enriched-news --partitions 1 --replication-factor 1 --config retention.ms=172800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic validated-news --partitions 1 --replication-factor 1 --config retention.ms=172800000
        echo ''
        echo '=== Topics created ==='
        kafka-topics --bootstrap-server kafka:9092 --list
    networks:
      - newslens-net

  # ---------- Kafka UI (topic inspector on localhost:8080) ----------
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: newslens-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: newslens
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - newslens-net

  # ---------- Producer Service ----------
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: newslens-producer
    env_file: .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: on-failure
    networks:
      - newslens-net

  # ---------- Flink JobManager (cluster coordinator + Web UI) ----------
  flink-jobmanager:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: newslens-flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"        # Flink Web UI
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - newslens-net

  # ---------- Flink TaskManager (executes the stream job) ----------
  flink-taskmanager:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: newslens-flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 1
        state.backend: rocksdb
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    depends_on:
      - flink-jobmanager
    networks:
      - newslens-net

  # ---------- Ollama — Local LLM Server (Mistral 7B on CPU) ----------
  ollama:
    image: ollama/ollama:latest
    container_name: newslens-ollama
    hostname: ollama
    ports:
      - "11434:11434"        # host access for local testing
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - newslens-net

  # ---------- Enrichment Worker (LangChain LLM consumer) ----------
  enrichment-worker:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    container_name: newslens-enrichment-worker
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: on-failure
    networks:
      - newslens-net

  # ---------- Quality Gate (GX validation + embedding) ----------
  quality-gate:
    build:
      context: ./quality_gate
      dockerfile: Dockerfile
    container_name: newslens-quality-gate
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      enrichment-worker:
        condition: service_started
    restart: on-failure
    networks:
      - newslens-net

  # ---------- Weaviate — Vector Database (HNSW cosine, 384-dim) ----------
  weaviate:
    image: semitechnologies/weaviate:1.28.0
    container_name: newslens-weaviate
    hostname: weaviate
    ports:
      - "8085:8080"        # REST API (8085 to avoid kafka-ui conflict)
      - "50051:50051"      # gRPC (used by Python v4 client)
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - newslens-net

  # ---------- Weaviate Ingestion Worker (Kafka → Weaviate upsert) ----------
  weaviate-ingestion:
    build:
      context: ./weaviate_store
      dockerfile: Dockerfile
    container_name: newslens-weaviate-ingestion
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    restart: on-failure
    networks:
      - newslens-net

  # ---------- Airflow — Orchestration (Webserver + Scheduler) ----------
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: newslens-airflow
    ports:
      - "8082:8080"           # Airflow Web UI
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: "8080"
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type":"http","url":"http://marquez:5000"}'
      AIRFLOW__OPENLINEAGE__NAMESPACE: newslens
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    depends_on:
      kafka:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      marquez:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@newslens.local || true &&
        airflow webserver --port 8080 &
        airflow scheduler
    restart: on-failure
    networks:
      - newslens-net

  # ---------- Marquez — OpenLineage Metadata Server ----------
  marquez:
    image: marquezproject/marquez:0.44.0
    container_name: newslens-marquez
    ports:
      - "5000:5000"           # Marquez API (OpenLineage receiver)
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    depends_on:
      marquez-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - newslens-net

  # ---------- Marquez Web UI — Lineage Visualization ----------
  marquez-web:
    image: marquezproject/marquez-web:0.44.0
    container_name: newslens-marquez-web
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
    depends_on:
      - marquez
    restart: on-failure
    networks:
      - newslens-net

  # ---------- Marquez DB — Postgres for Lineage Metadata ----------
  marquez-db:
    image: postgres:15
    container_name: newslens-marquez-db
    hostname: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    volumes:
      - marquez-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: on-failure
    networks:
      newslens-net:
        aliases:
          - postgres

  # ---------- Dashboard — Streamlit UI ----------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: newslens-dashboard
    ports:
      - "8501:8501"
    environment:
      WEAVIATE_HTTP_HOST: weaviate
      WEAVIATE_HTTP_PORT: "8080"
      WEAVIATE_GRPC_HOST: weaviate
      WEAVIATE_GRPC_PORT: "50051"
      WEAVIATE_COLLECTION: NewsArticle
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
    depends_on:
      - weaviate
      - ollama
    restart: on-failure
    networks:
      - newslens-net

networks:
  newslens-net:
    driver: bridge
    name: newslens-net

volumes:
  ollama-data:
  weaviate-data:
  airflow-logs:
  marquez-db-data:
