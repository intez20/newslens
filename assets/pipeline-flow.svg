<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Gradient backgrounds for each stage -->
    <linearGradient id="srcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="kafkaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="qualGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="vecGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </linearGradient>
    <!-- Animated dot -->
    <circle id="dot" r="5" fill="#FF5722" opacity="0.9"/>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a237e">🔍 NewsLens — Real-Time Data Flow</text>

  <!-- ═══════════ STAGE 1: SOURCES ═══════════ -->
  <rect x="20" y="55" width="130" height="240" rx="10" fill="url(#srcGrad)" stroke="#4caf50" stroke-width="2"/>
  <text x="85" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">📡 Sources</text>
  <!-- Source boxes -->
  <rect x="32" y="90" width="106" height="38" rx="6" fill="white" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="85" y="106" text-anchor="middle" font-size="9" fill="#333">🇬🇧 Guardian API</text>
  <text x="85" y="120" text-anchor="middle" font-size="7" fill="#666">100 articles/poll</text>

  <rect x="32" y="135" width="106" height="38" rx="6" fill="white" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="85" y="151" text-anchor="middle" font-size="9" fill="#333">📰 RSS Feeds</text>
  <text x="85" y="165" text-anchor="middle" font-size="7" fill="#666">200 articles/poll</text>

  <rect x="32" y="180" width="106" height="38" rx="6" fill="white" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="85" y="196" text-anchor="middle" font-size="9" fill="#333">🟠 HackerNews</text>
  <text x="85" y="210" text-anchor="middle" font-size="7" fill="#666">30 articles/poll</text>

  <rect x="32" y="225" width="106" height="38" rx="6" fill="white" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="85" y="241" text-anchor="middle" font-size="9" fill="#333">🦋 Bluesky</text>
  <text x="85" y="255" text-anchor="middle" font-size="7" fill="#666">80 posts/poll</text>

  <!-- ═══════════ STAGE 2: PRODUCER ═══════════ -->
  <rect x="175" y="120" width="110" height="110" rx="10" fill="white" stroke="#3776AB" stroke-width="2"/>
  <text x="230" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#3776AB">🐍 Producer</text>
  <text x="230" y="166" text-anchor="middle" font-size="8" fill="#555">Fetch &amp; Dedup</text>
  <text x="230" y="180" text-anchor="middle" font-size="8" fill="#555">Normalize</text>
  <text x="230" y="194" text-anchor="middle" font-size="8" fill="#555">Publish</text>
  <text x="230" y="214" text-anchor="middle" font-size="7" fill="#888">every 15 min</text>

  <!-- ═══════════ Arrow: Sources → Producer ═══════════ -->
  <line x1="150" y1="175" x2="175" y2="175" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 3: KAFKA (raw-news) ═══════════ -->
  <rect x="310" y="145" width="100" height="60" rx="8" fill="url(#kafkaGrad)" stroke="#ff9800" stroke-width="2"/>
  <text x="360" y="168" text-anchor="middle" font-size="9" font-weight="700" fill="#e65100">📬 Kafka</text>
  <text x="360" y="183" text-anchor="middle" font-size="8" fill="#555">raw-news</text>
  <text x="360" y="196" text-anchor="middle" font-size="7" fill="#888">3 partitions</text>

  <!-- Arrow: Producer → raw-news -->
  <line x1="285" y1="175" x2="310" y2="175" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 4: PROCESSOR (Router) ═══════════ -->
  <rect x="435" y="100" width="100" height="60" rx="8" fill="white" stroke="#E6526F" stroke-width="2"/>
  <text x="485" y="123" text-anchor="middle" font-size="9" font-weight="700" fill="#E6526F">⚡ Processor</text>
  <text x="485" y="138" text-anchor="middle" font-size="8" fill="#555">Category Router</text>
  <text x="485" y="152" text-anchor="middle" font-size="7" fill="#888">Flink / Python</text>

  <!-- Arrow: raw-news → Processor -->
  <line x1="410" y1="165" x2="435" y2="135" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 5: KAFKA (category topics) ═══════════ -->
  <rect x="560" y="55" width="105" height="150" rx="8" fill="url(#kafkaGrad)" stroke="#ff9800" stroke-width="2"/>
  <text x="612" y="75" text-anchor="middle" font-size="9" font-weight="700" fill="#e65100">📬 Category Topics</text>

  <rect x="568" y="85" width="89" height="28" rx="5" fill="white" stroke="#ffb74d"/>
  <text x="612" y="103" text-anchor="middle" font-size="8" fill="#333">tech-news</text>

  <rect x="568" y="120" width="89" height="28" rx="5" fill="white" stroke="#ffb74d"/>
  <text x="612" y="138" text-anchor="middle" font-size="8" fill="#333">finance-news</text>

  <rect x="568" y="155" width="89" height="28" rx="5" fill="white" stroke="#ffb74d"/>
  <text x="612" y="173" text-anchor="middle" font-size="8" fill="#333">world-news</text>

  <!-- Arrows: Processor → category topics -->
  <line x1="535" y1="115" x2="560" y2="100" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="535" y1="130" x2="560" y2="134" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="535" y1="145" x2="560" y2="165" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 6: ENRICHMENT ═══════════ -->
  <rect x="690" y="70" width="120" height="130" rx="10" fill="url(#aiGrad)" stroke="#9c27b0" stroke-width="2"/>
  <text x="750" y="93" text-anchor="middle" font-size="10" font-weight="700" fill="#6a1b9a">🧠 Enrichment</text>

  <rect x="700" y="100" width="100" height="35" rx="5" fill="white" stroke="#ab47bc"/>
  <text x="750" y="115" text-anchor="middle" font-size="8" fill="#333">Enrichment Worker</text>
  <text x="750" y="127" text-anchor="middle" font-size="7" fill="#666">LangChain + Pydantic</text>

  <rect x="700" y="143" width="100" height="35" rx="5" fill="white" stroke="#ab47bc"/>
  <text x="750" y="158" text-anchor="middle" font-size="8" fill="#333">🦙 Ollama/Mistral</text>
  <text x="750" y="170" text-anchor="middle" font-size="7" fill="#666">Summary, Sentiment</text>
  <text x="750" y="182" text-anchor="middle" font-size="7" fill="#666">Entities, Tags</text>

  <!-- Arrows: categories → enrichment -->
  <line x1="665" y1="100" x2="690" y2="115" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="665" y1="134" x2="690" y2="125" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="665" y1="168" x2="690" y2="140" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ KAFKA: enriched-news ═══════════ -->
  <rect x="690" y="220" width="120" height="40" rx="8" fill="url(#kafkaGrad)" stroke="#ff9800" stroke-width="1.5"/>
  <text x="750" y="240" text-anchor="middle" font-size="8" font-weight="600" fill="#e65100">📬 enriched-news</text>
  <text x="750" y="253" text-anchor="middle" font-size="7" fill="#888">→ Quality Gate</text>

  <!-- Arrow: Enrichment → enriched-news -->
  <line x1="750" y1="200" x2="750" y2="220" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 7: QUALITY GATE ═══════════ -->
  <rect x="690" y="280" width="120" height="100" rx="10" fill="url(#qualGrad)" stroke="#2196f3" stroke-width="2"/>
  <text x="750" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">✅ Quality Gate</text>
  <rect x="700" y="308" width="100" height="25" rx="4" fill="white" stroke="#42a5f5"/>
  <text x="750" y="324" text-anchor="middle" font-size="7" fill="#333">Great Expectations</text>
  <rect x="700" y="340" width="100" height="25" rx="4" fill="white" stroke="#42a5f5"/>
  <text x="750" y="349" text-anchor="middle" font-size="7" fill="#333">🔢 Embedding 384-dim</text>
  <text x="750" y="361" text-anchor="middle" font-size="6" fill="#666">all-MiniLM-L6-v2</text>

  <!-- Arrow: enriched-news → Quality Gate -->
  <line x1="750" y1="260" x2="750" y2="280" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ KAFKA: validated-news ═══════════ -->
  <rect x="840" y="310" width="110" height="40" rx="8" fill="url(#kafkaGrad)" stroke="#ff9800" stroke-width="1.5"/>
  <text x="895" y="330" text-anchor="middle" font-size="8" font-weight="600" fill="#e65100">📬 validated-news</text>
  <text x="895" y="343" text-anchor="middle" font-size="7" fill="#888">+ vector embedding</text>

  <!-- Arrow: Quality Gate → validated-news -->
  <line x1="810" y1="330" x2="840" y2="330" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 8: WEAVIATE ═══════════ -->
  <rect x="975" y="290" width="110" height="75" rx="10" fill="url(#vecGrad)" stroke="#009688" stroke-width="2"/>
  <text x="1030" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#00695c">💾 Weaviate</text>
  <text x="1030" y="330" text-anchor="middle" font-size="8" fill="#555">NewsArticle</text>
  <text x="1030" y="344" text-anchor="middle" font-size="7" fill="#666">HNSW + Cosine</text>
  <text x="1030" y="357" text-anchor="middle" font-size="7" fill="#888">Vector Search</text>

  <!-- Arrow: validated-news → Weaviate -->
  <line x1="950" y1="330" x2="975" y2="330" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════ STAGE 9: DASHBOARD ═══════════ -->
  <rect x="975" y="390" width="195" height="115" rx="10" fill="url(#dashGrad)" stroke="#e91e63" stroke-width="2"/>
  <text x="1072" y="413" text-anchor="middle" font-size="10" font-weight="700" fill="#880e4f">📊 Streamlit Dashboard</text>

  <rect x="985" y="422" width="85" height="30" rx="5" fill="white" stroke="#ec407a"/>
  <text x="1027" y="435" text-anchor="middle" font-size="7" fill="#333">📋 Live Feed</text>
  <text x="1027" y="446" text-anchor="middle" font-size="6" fill="#666">Latest articles</text>

  <rect x="1078" y="422" width="85" height="30" rx="5" fill="white" stroke="#ec407a"/>
  <text x="1120" y="435" text-anchor="middle" font-size="7" fill="#333">🔍 Ask NewsLens</text>
  <text x="1120" y="446" text-anchor="middle" font-size="6" fill="#666">RAG Q&amp;A</text>

  <rect x="985" y="460" width="85" height="30" rx="5" fill="white" stroke="#ec407a"/>
  <text x="1027" y="473" text-anchor="middle" font-size="7" fill="#333">📈 Metrics</text>
  <text x="1027" y="484" text-anchor="middle" font-size="6" fill="#666">KPIs &amp; Charts</text>

  <rect x="1078" y="460" width="85" height="30" rx="5" fill="white" stroke="#ec407a"/>
  <text x="1120" y="473" text-anchor="middle" font-size="7" fill="#333">👤 User</text>
  <text x="1120" y="484" text-anchor="middle" font-size="6" fill="#666">Interactive</text>

  <!-- Arrow: Weaviate → Dashboard -->
  <line x1="1030" y1="365" x2="1030" y2="390" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow: Ollama → Dashboard (RAG) dashed -->
  <line x1="810" y1="170" x2="1078" y2="435" stroke="#9c27b0" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowhead)" opacity="0.6"/>
  <text x="940" y="295" font-size="7" fill="#9c27b0" transform="rotate(-25, 940, 295)">RAG streaming</text>

  <!-- ═══════════ DEAD LETTER (bottom) ═══════════ -->
  <rect x="500" y="280" width="110" height="35" rx="6" fill="#ffebee" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="555" y="300" text-anchor="middle" font-size="8" font-weight="600" fill="#c62828">❌ news-failed</text>
  <text x="555" y="311" text-anchor="middle" font-size="7" fill="#888">Dead Letter Queue</text>

  <!-- Dashed arrows to dead letter -->
  <line x1="690" y1="190" x2="610" y2="280" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead)" opacity="0.5"/>
  <line x1="690" y1="340" x2="610" y2="305" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead)" opacity="0.5"/>

  <!-- ═══════════ OBSERVABILITY (bottom-left) ═══════════ -->
  <rect x="20" y="330" width="290" height="175" rx="10" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="165" y="352" text-anchor="middle" font-size="10" font-weight="700" fill="#616161">🔭 Observability Layer</text>

  <rect x="30" y="362" width="130" height="40" rx="6" fill="white" stroke="#017CEE" stroke-width="1.2"/>
  <text x="95" y="380" text-anchor="middle" font-size="8" fill="#017CEE" font-weight="600">🔄 Airflow 2.8</text>
  <text x="95" y="394" text-anchor="middle" font-size="7" fill="#666">Health DAGs / 15min</text>

  <rect x="170" y="362" width="130" height="40" rx="6" fill="white" stroke="#4B0082" stroke-width="1.2"/>
  <text x="235" y="380" text-anchor="middle" font-size="8" fill="#4B0082" font-weight="600">🔍 Marquez 0.44</text>
  <text x="235" y="394" text-anchor="middle" font-size="7" fill="#666">OpenLineage</text>

  <rect x="30" y="412" width="130" height="40" rx="6" fill="white" stroke="#231F20" stroke-width="1.2"/>
  <text x="95" y="430" text-anchor="middle" font-size="8" fill="#231F20" font-weight="600">📬 Kafbat UI</text>
  <text x="95" y="444" text-anchor="middle" font-size="7" fill="#666">Topics &amp; Lag</text>

  <rect x="170" y="412" width="130" height="40" rx="6" fill="white" stroke="#E6526F" stroke-width="1.2"/>
  <text x="235" y="430" text-anchor="middle" font-size="8" fill="#E6526F" font-weight="600">⚡ Flink UI</text>
  <text x="235" y="444" text-anchor="middle" font-size="7" fill="#666">Jobs &amp; Metrics</text>

  <rect x="30" y="462" width="270" height="30" rx="5" fill="#fff9c4" stroke="#fbc02d" stroke-width="1"/>
  <text x="165" y="480" text-anchor="middle" font-size="8" fill="#f57f17">🔔 Discord Alerts on failure</text>

  <!-- ═══════════ ANIMATED DATA DOTS ═══════════ -->
  
  <!-- Dot 1: Sources → Producer -->
  <circle r="5" fill="#4caf50" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M85,175 L175,175" begin="0s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="0s"/>
  </circle>

  <!-- Dot 2: Producer → raw-news -->
  <circle r="5" fill="#3776AB" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M285,175 L310,175" begin="1s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Dot 3: raw-news → Processor -->
  <circle r="5" fill="#ff9800" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M410,165 L435,135" begin="2s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="2s"/>
  </circle>

  <!-- Dot 4: Processor → category topics -->
  <circle r="4" fill="#E6526F" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M535,115 L560,100" begin="3s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="3s"/>
  </circle>
  <circle r="4" fill="#E6526F" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M535,130 L560,134" begin="3.2s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="3.2s"/>
  </circle>
  <circle r="4" fill="#E6526F" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M535,145 L560,165" begin="3.4s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="3.4s"/>
  </circle>

  <!-- Dot 5: categories → Enrichment -->
  <circle r="5" fill="#9c27b0" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M665,130 L690,125" begin="4s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="4s"/>
  </circle>

  <!-- Dot 6: Enrichment → enriched-news → Quality Gate -->
  <circle r="5" fill="#9c27b0" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M750,200 L750,280" begin="5s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="5s"/>
  </circle>

  <!-- Dot 7: Quality Gate → validated-news -->
  <circle r="5" fill="#2196f3" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M810,330 L840,330" begin="6s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="6s"/>
  </circle>

  <!-- Dot 8: validated-news → Weaviate -->
  <circle r="5" fill="#009688" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M950,330 L975,330" begin="6.5s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="6.5s"/>
  </circle>

  <!-- Dot 9: Weaviate → Dashboard -->
  <circle r="5" fill="#e91e63" opacity="0.85">
    <animateMotion dur="8s" repeatCount="indefinite" path="M1030,365 L1030,390" begin="7s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="7s"/>
  </circle>

  <!-- ═══════════ CONTINUOUS FLOW DOTS (faster cycle) ═══════════ -->
  
  <!-- Full pipeline traversal dot -->
  <circle r="6" fill="#FF5722" opacity="0.9">
    <animateMotion dur="12s" repeatCount="indefinite" 
      path="M85,175 L230,175 L360,175 L485,135 L612,130 L750,130 L750,240 L750,330 L895,330 L1030,330 L1030,430"/>
    <animate attributeName="r" values="4;6;4;6;4;6;4" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Second traversal dot (offset) -->
  <circle r="5" fill="#FF9800" opacity="0.7">
    <animateMotion dur="12s" repeatCount="indefinite" begin="4s"
      path="M85,175 L230,175 L360,175 L485,135 L612,130 L750,130 L750,240 L750,330 L895,330 L1030,330 L1030,430"/>
    <animate attributeName="r" values="3;5;3;5;3;5;3" dur="12s" repeatCount="indefinite" begin="4s"/>
  </circle>

  <!-- Third traversal dot (offset) -->
  <circle r="4" fill="#4CAF50" opacity="0.7">
    <animateMotion dur="12s" repeatCount="indefinite" begin="8s"
      path="M85,175 L230,175 L360,175 L485,135 L612,130 L750,130 L750,240 L750,330 L895,330 L1030,330 L1030,430"/>
    <animate attributeName="r" values="3;4;3;4;3;4;3" dur="12s" repeatCount="indefinite" begin="8s"/>
  </circle>

  <!-- ═══════════ STAGE LABELS (bottom bar) ═══════════ -->
  <rect x="20" y="510" width="1160" height="3" rx="1.5" fill="#e0e0e0"/>
  <circle cx="85" cy="511" r="4" fill="#4caf50"/>
  <circle cx="230" cy="511" r="4" fill="#3776AB"/>
  <circle cx="360" cy="511" r="4" fill="#ff9800"/>
  <circle cx="485" cy="511" r="4" fill="#E6526F"/>
  <circle cx="612" cy="511" r="4" fill="#ff9800"/>
  <circle cx="750" cy="511" r="4" fill="#9c27b0"/>
  <circle cx="895" cy="511" r="4" fill="#2196f3"/>
  <circle cx="1030" cy="511" r="4" fill="#009688"/>
  <circle cx="1120" cy="511" r="4" fill="#e91e63"/>
</svg>
